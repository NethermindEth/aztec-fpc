services:
  attestation:
    image: "${ATTESTATION_IMAGE:-nethermind/aztec-fpc-attestation:local}"
    ports:
      - "3000:3000"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/attestation/config.yaml"]
    environment:
      FPC_RUNTIME_PROFILE: "${FPC_RUNTIME_PROFILE:-development}"
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-https://v4-devnet-2.aztec-labs.com/}"
      OPERATOR_SECRET_PROVIDER: "${OPERATOR_SECRET_PROVIDER:-env}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:?set OPERATOR_SECRET_KEY in .env}"
      QUOTE_AUTH_MODE: "${QUOTE_AUTH_MODE:-disabled}"

  topup:
    image: "${TOPUP_IMAGE:-nethermind/aztec-fpc-topup:local}"
    ports:
      - "3001:3001"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/topup/config.yaml"]
    environment:
      FPC_RUNTIME_PROFILE: "${FPC_RUNTIME_PROFILE:-development}"
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-https://v4-devnet-2.aztec-labs.com/}"
      L1_RPC_URL: "${L1_RPC_URL:?set L1_RPC_URL in .env}"
      L1_OPERATOR_SECRET_PROVIDER: "${L1_OPERATOR_SECRET_PROVIDER:-env}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:?set L1_OPERATOR_PRIVATE_KEY in .env}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:-}"
      TOPUP_AUTOCLAIM_SECRET_KEY: "${TOPUP_AUTOCLAIM_SECRET_KEY:-}"
      TOPUP_AUTOCLAIM_USE_OPERATOR_SECRET_KEY: "${TOPUP_AUTOCLAIM_USE_OPERATOR_SECRET_KEY:-1}"
      TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS: "${TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS:-${FPC_DEVNET_SPONSORED_FPC_ADDRESS:-${SPONSORED_FPC_ADDRESS:-}}}"
      TOPUP_AUTOCLAIM_REQUIRE_PUBLISHED_ACCOUNT: "${TOPUP_AUTOCLAIM_REQUIRE_PUBLISHED_ACCOUNT:-1}"
      TOPUP_OPS_PORT: "${TOPUP_OPS_PORT:-3001}"
      TOPUP_BRIDGE_STATE_PATH: "${TOPUP_BRIDGE_STATE_PATH:-/tmp/.topup-bridge-state.json}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
      TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX: "${TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX:-0}"
      TOPUP_FEE_JUICE_RECIPIENT_ADDRESS: "${TOPUP_FEE_JUICE_RECIPIENT_ADDRESS:-}"
      HOME: "/tmp"
      CRS_PATH: "${CRS_PATH:-/tmp/.bb-crs}"
