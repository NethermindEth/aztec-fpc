name: aztec-fpc-public
services:
  deploy:
    image: "${DEPLOY_IMAGE:-nethermind/aztec-fpc-contract-deployment:local}"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data
    environment:
      FPC_ACCEPTED_ASSET: "${FPC_ACCEPTED_ASSET}"
      FPC_DEPLOYER_SECRET_KEY: "${FPC_DEPLOYER_SECRET_KEY}"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
      FPC_DATA_DIR: "/app/data"
      FPC_TEST_TOKEN_OUT: "/app/data/tokens/FpcAcceptedAsset.json"
    env_file:
      - .env.${DEPLOYMENT}

  postdeploy:
    image: "${TEST_IMAGE:-nethermind/aztec-fpc-test:local}"
    entrypoint: ["bun", "run", "--sequential"]
    command:
      - "scripts/contract/devnet-postdeploy-smoke.ts"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    environment:
      FPC_DEVNET_SMOKE_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      L1_OPERATOR_PRIVATE_KEY: "${FPC_L1_DEPLOYER_KEY}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      deploy:
        condition: service_completed_successfully

  attestation:
    image: "${ATTESTATION_IMAGE:-nethermind/aztec-fpc-attestation:local}"
    ports:
      - "${ATTESTATION_PORT:-3000}:3000"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    command: ["--config", "/app/data/attestation/config.yaml"]
    environment:
      FPC_RUNTIME_PROFILE: "${FPC_RUNTIME_PROFILE:-development}"
      OPERATOR_SECRET_PROVIDER: "${OPERATOR_SECRET_PROVIDER:-env}"
      OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      QUOTE_AUTH_MODE: "${QUOTE_AUTH_MODE:-disabled}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      deploy:
        condition: service_completed_successfully

  topup:
    image: "${TOPUP_IMAGE:-nethermind/aztec-fpc-topup:local}"
    ports:
      - "${TOPUP_OPS_PORT:-3001}:3001"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    command: ["--config", "/app/data/topup/config.yaml"]
    environment:
      FPC_RUNTIME_PROFILE: "${FPC_RUNTIME_PROFILE:-development}"
      L1_OPERATOR_SECRET_PROVIDER: "${L1_OPERATOR_SECRET_PROVIDER:-env}"
      L1_OPERATOR_PRIVATE_KEY: "${FPC_L1_DEPLOYER_KEY}"
      OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-}"
      TOPUP_AUTOCLAIM_SECRET_KEY: "${TOPUP_AUTOCLAIM_SECRET_KEY:-}"
      TOPUP_AUTOCLAIM_USE_OPERATOR_SECRET_KEY: "${TOPUP_AUTOCLAIM_USE_OPERATOR_SECRET_KEY:-1}"
      TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS: "${TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS:-}"
      TOPUP_AUTOCLAIM_REQUIRE_PUBLISHED_ACCOUNT: "${TOPUP_AUTOCLAIM_REQUIRE_PUBLISHED_ACCOUNT:-0}"
      TOPUP_OPS_PORT: "${TOPUP_OPS_PORT:-3001}"
      TOPUP_DATA_DIR: "${TOPUP_DATA_DIR:-/tmp/.topup-data}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      deploy:
        condition: service_completed_successfully

  configure-token:
    image: "${DEPLOY_IMAGE:-nethermind/aztec-fpc-contract-deployment:local}"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data
    command: ["configure-token"]
    environment:
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
      FPC_DEPLOYER_SECRET_KEY: "${FPC_DEPLOYER_SECRET_KEY}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY}"
      FPC_DATA_DIR: "/app/data"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy

  tests-cold-start:
    image: "${TEST_IMAGE:-nethermind/aztec-fpc-test:local}"
    profiles: ["full"]
    command:
      - "./scripts/tests/cold-start.ts"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    environment:
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY}"
      FPC_L1_USER_KEY: "${FPC_L1_USER_KEY}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy
      configure-token:
        condition: service_completed_successfully

  tests-same-token-transfer:
    image: "${TEST_IMAGE:-nethermind/aztec-fpc-test:local}"
    profiles: ["full"]
    command:
      - "./scripts/tests/same-token-transfer.ts"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    environment:
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy
      configure-token:
        condition: service_completed_successfully

  tests-always-revert:
    image: "${TEST_IMAGE:-nethermind/aztec-fpc-test:local}"
    profiles: ["full"]
    command:
      - "./scripts/tests/always-revert.ts"
    volumes:
      - ./deployments/${DEPLOYMENT}:/app/data:ro
    environment:
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    env_file:
      - .env.${DEPLOYMENT}
    depends_on:
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy
      configure-token:
        condition: service_completed_successfully
