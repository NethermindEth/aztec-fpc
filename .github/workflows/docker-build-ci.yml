name: Docker build CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "docker-compose.yaml"
      - "docker-bake.hcl"
      - "Dockerfile.smoke"
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".github/workflows/docker-build-ci.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "docker-compose.yaml"
              - "docker-bake.hcl"
              - "Dockerfile.smoke"
              - "contracts/**"
              - "scripts/**"
              - "services/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig*.json"
              - ".github/workflows/docker-build-ci.yml"

  docker-build-ci:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build all images
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        with:
          source: .
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run services and tests
        run: docker compose --profile full up wait --wait

      - name: Print smoke-services logs
        if: always()
        run: docker compose --profile full logs --timestamps smoke-services

      - name: Print smoke-fee-entrypoint logs
        if: always()
        run: docker compose --profile full logs --timestamps smoke-fee-entrypoint

      - name: Print smoke-same-token-transfer logs
        if: always()
        run: docker compose --profile full logs --timestamps smoke-same-token-transfer

      - name: Print e2e-fpc logs
        if: always()
        run: docker compose --profile full logs --timestamps e2e-fpc

      - name: Print deploy logs
        if: always()
        run: docker compose --profile full logs --timestamps deploy

      - name: Print attestation logs
        if: always()
        run: docker compose --profile full logs --timestamps attestation

      - name: Print topup logs
        if: always()
        run: docker compose --profile full logs --timestamps topup

      - name: Tear down
        if: always()
        run: docker compose --profile full down -v --remove-orphans

      - name: Deploy to devnet
        env:
          FPC_DEPLOYER_SECRET_KEY: ${{ secrets.FPC_DEPLOYER_SECRET_KEY }}
          FPC_OPERATOR_SECRET_KEY: ${{ secrets.FPC_OPERATOR_SECRET_KEY }}
          FPC_ACCEPTED_ASSET: ${{ vars.FPC_ACCEPTED_ASSET }}
        run: |
          docker run \
            -e FPC_DEPLOYER_SECRET_KEY \
            -e FPC_OPERATOR_SECRET_KEY \
            -e FPC_ACCEPTED_ASSET \
            -e FPC_SKIP_CONFIG_GEN=1 \
            -v ${{ github.workspace }}/deployments:/app/data \
            nethermind/aztec-fpc-contract-deployment:local
