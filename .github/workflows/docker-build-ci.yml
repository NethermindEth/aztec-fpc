name: Docker build CI

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "docker-compose.yaml"
      - "docker-bake.hcl"
      - "Dockerfile.smoke"
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".github/workflows/docker-build-ci.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "docker-compose.yaml"
              - "docker-bake.hcl"
              - "Dockerfile.smoke"
              - "contracts/**"
              - "scripts/**"
              - "services/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig*.json"
              - ".github/workflows/docker-build-ci.yml"

  docker-build-ci:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build all images
        run: docker buildx bake --load

      - name: Start services
        if: github.event_name == 'pull_request'
        run: bash scripts/services/compose-mode.sh infra --wait

      - name: Smoke tests
        if: github.event_name != 'pull_request'
        run: bash scripts/services/compose-mode.sh full

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans
