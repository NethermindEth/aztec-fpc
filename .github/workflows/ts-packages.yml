name: TS packages

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "sdk/**"
      - "services/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - "README.md"
      - "docs/spec.md"
      - "docs/ALPHA-ADHOC-FPC-OPERATOR-RUNBOOK.md"
      - ".github/workflows/ts-packages.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "sdk/**"
              - "services/**"
              - "scripts/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig*.json"
              - "README.md"
              - "docs/spec.md"
              - "docs/ALPHA-ADHOC-FPC-OPERATOR-RUNBOOK.md"
              - ".github/workflows/ts-packages.yml"

  check-and-test:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Biome CI
        run: bunx biome ci --config-path ./biome.json

      - name: Docs quote schema guard
        run: bun run check:docs:quote-schema

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test:ts
