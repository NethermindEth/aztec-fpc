name: Build contract

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "contracts/**"
      - "vendor/aztec-standards/**"
      - "Nargo.toml"
      - ".aztecrc"
      - ".github/workflows/build-contract.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "contracts/**"
              - "vendor/aztec-standards/**"
              - "Nargo.toml"
              - ".aztecrc"
              - ".github/workflows/build-contract.yml"

  build-and-test:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Read Aztec version
        id: aztec-version
        run: echo "version=$(cat .aztecrc | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Add Aztec to PATH
        run: |
          echo "$HOME/.aztec/current/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/current/node_modules/.bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/bin" >> $GITHUB_PATH

      - name: Cache Aztec toolchain
        uses: actions/cache@v5
        with:
          path: ~/.aztec
          key: aztec-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}

      - name: Install Aztec
        env:
          VERSION: ${{ steps.aztec-version.outputs.version }}
        run: |
          output=$(aztec-up use 2>&1) || true
          if echo "$output" | grep -q "Using aztec version $VERSION"; then
            echo "Already using Aztec version $VERSION, skipping install"
            exit 0
          fi
          bash -i <(curl -sL https://install.aztec.network/$VERSION)

      - name: Format check
        run: nargo fmt --check

      - name: Build contracts
        run: aztec compile --workspace

      - name: Test fpc contract
        run: aztec test --package fpc
