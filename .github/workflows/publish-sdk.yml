name: Publish sdk

on:
  push:
    branches:
      - main
    paths:
      - "sdk/**"
      - "bun.lock"
      - "package.json"
      - ".github/workflows/publish-sdk.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.11"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Compare local vs npm version
        id: version_check
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./sdk/package.json').name")"
          LOCAL_VERSION="$(node -p "require('./sdk/package.json').version")"
          REMOTE_VERSION="$(npm view "$PACKAGE_NAME" version 2>/dev/null || true)"

          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "local_version=$LOCAL_VERSION" >> "$GITHUB_OUTPUT"
          echo "remote_version=$REMOTE_VERSION" >> "$GITHUB_OUTPUT"

          if [ "$LOCAL_VERSION" = "$REMOTE_VERSION" ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish decision
        run: |
          echo "package: ${{ steps.version_check.outputs.package_name }}"
          echo "local version: ${{ steps.version_check.outputs.local_version }}"
          echo "npm version: ${{ steps.version_check.outputs.remote_version }}"
          echo "publish: ${{ steps.version_check.outputs.should_publish }}"

      - name: Build and test sdk
        if: steps.version_check.outputs.should_publish == 'true'
        run: |
          bunx biome ci --config-path ./biome.json sdk/src sdk/test sdk/package.json sdk/tsconfig.json
          bun run --cwd sdk typecheck
          bun run --cwd sdk test
          bun run --cwd sdk build

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace @aztec-fpc/sdk --access public --provenance
