name: Spec full lifecycle compose

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "docker-compose.yaml"
      - "docker-bake.hcl"
      - "Dockerfile.smoke"
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".aztecrc"
      - ".github/workflows/spec-full-lifecycle-compose.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "docker-compose.yaml"
      - "docker-bake.hcl"
      - "Dockerfile.smoke"
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".aztecrc"
      - ".github/workflows/spec-full-lifecycle-compose.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-lifecycle-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build docker images
        run: docker buildx bake --load

      - name: Run compose full lifecycle (FPC)
        run: bash scripts/services/full-lifecycle-compose.sh fpc

      - name: Run compose full lifecycle (CreditFPC)
        run: bash scripts/services/full-lifecycle-compose.sh credit

      - name: Normalize compose artifact permissions
        if: always()
        run: |
          if [ -d artifacts/compose-e2e ]; then
            sudo chown -R "$USER:$USER" artifacts/compose-e2e || true
            sudo find artifacts/compose-e2e -type d -exec chmod 755 {} +
            sudo find artifacts/compose-e2e -type f -exec chmod 644 {} +
          fi

      - name: Upload compose lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-full-lifecycle-artifacts
          path: artifacts/compose-e2e
          if-no-files-found: warn
