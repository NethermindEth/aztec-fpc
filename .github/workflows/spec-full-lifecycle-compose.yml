name: Spec full lifecycle compose

on:
  push:
    branches:
      - main
    tags:
      - "**"
    paths:
      - "docker-compose.yaml"
      - "docker-bake.hcl"
      - "Dockerfile.smoke"
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".aztecrc"
      - ".github/workflows/spec-full-lifecycle-compose.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "docker-compose.yaml"
              - "docker-bake.hcl"
              - "Dockerfile.smoke"
              - "contracts/**"
              - "scripts/**"
              - "services/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig*.json"
              - ".aztecrc"
              - ".github/workflows/spec-full-lifecycle-compose.yml"

  full-lifecycle-compose:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        uses: docker/bake-action@5be5f02ff8819ecd3092ea6b2e6261c31774f2b4 # v6.10.0
        with:
          source: .
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: Run compose full lifecycle (FPC)
        run: bash scripts/services/full-lifecycle-compose.sh

      - name: Normalize compose artifact permissions
        if: always()
        run: |
          if [ -d artifacts/compose-e2e ]; then
            sudo chown -R "$USER:$USER" artifacts/compose-e2e || true
            sudo find artifacts/compose-e2e -type d -exec chmod 755 {} +
            sudo find artifacts/compose-e2e -type f -exec chmod 644 {} +
          fi

      - name: Upload compose lifecycle artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-full-lifecycle-artifacts
          path: artifacts/compose-e2e
          if-no-files-found: warn
