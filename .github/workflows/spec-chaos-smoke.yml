name: Spec chaos smoke

on:
  push:
    branches:
      - main
    paths:
      - "contracts/**"
      - "scripts/**"
      - "services/**"
      - "vendor/aztec-standards/**"
      - "package.json"
      - "bun.lock"
      - "tsconfig*.json"
      - ".aztecrc"
      - ".github/workflows/spec-chaos-smoke.yml"
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      chaos_mode:
        description: "Chaos mode (api, onchain, full)"
        required: false
        default: "full"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detect relevant changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            relevant:
              - "contracts/**"
              - "scripts/**"
              - "services/**"
              - "vendor/aztec-standards/**"
              - "package.json"
              - "bun.lock"
              - "tsconfig*.json"
              - ".aztecrc"
              - ".github/workflows/spec-chaos-smoke.yml"

  chaos-smoke:
    needs: [changes]
    if: github.event_name != 'pull_request' || needs.changes.outputs.relevant == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Read Aztec version
        id: aztec-version
        run: echo "version=$(cat .aztecrc | tr -d '\n')" >> $GITHUB_OUTPUT

      - name: Add Aztec to PATH
        run: |
          echo "$HOME/.aztec/current/bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/current/node_modules/.bin" >> $GITHUB_PATH
          echo "$HOME/.aztec/bin" >> $GITHUB_PATH

      - name: Cache Aztec toolchain
        uses: actions/cache@v5
        with:
          path: ~/.aztec
          key: aztec-${{ runner.os }}-${{ steps.aztec-version.outputs.version }}

      - name: Install Aztec
        env:
          VERSION: ${{ steps.aztec-version.outputs.version }}
        run: |
          output=$(aztec-up use 2>&1) || true
          if echo "$output" | grep -q "Using aztec version $VERSION"; then
            echo "Already using Aztec version $VERSION, skipping install"
            exit 0
          fi
          bash -i <(curl -sL https://install.aztec.network/$VERSION)

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Determine chaos mode
        id: mode
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "chaos_mode=${{ github.event.inputs.chaos_mode || 'full' }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "chaos_mode=full" >> $GITHUB_OUTPUT
          else
            echo "chaos_mode=api" >> $GITHUB_OUTPUT
          fi

      - name: Run chaos smoke tests (mode=${{ steps.mode.outputs.chaos_mode }})
        env:
          FPC_CHAOS_LOCAL_START_NETWORK: "1"
          FPC_CHAOS_LOCAL_CHAOS_MODE: ${{ steps.mode.outputs.chaos_mode }}
        run: bash scripts/chaos/fpc-chaos-local.sh
