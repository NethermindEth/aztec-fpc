name: aztec-fpc
services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "bn", "--rpc-url", "http://localhost:8545"]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 5s

  aztec-node:
    image: aztecprotocol/aztec:4.1.0-rc.4
    command: ["start", "--local-network"]
    ports:
      - "8080:8080"
    environment:
      ARCHIVER_POLLING_INTERVAL_MS: 500
      P2P_BLOCK_CHECK_INTERVAL_MS: 500
      SEQ_TX_POLLING_INTERVAL_MS: 500
      WS_BLOCK_CHECK_INTERVAL_MS: 500
      ARCHIVER_VIEM_POLLING_INTERVAL_MS: 500
      TEST_ACCOUNTS: "true"
      LOG_LEVEL: "info;silent:sequencer;verbose:debug_log"
      DEPLOY_AZTEC_CONTRACTS_SALT: 1
      L1_CHAIN_ID: 31337
      ETHEREUM_HOSTS: "http://anvil:8545"
      # Effectively disable epoch pruning for local/CI test runs.
      # The default AZTEC_PROOF_SUBMISSION_EPOCHS is 1, which combined
      # with a small AZTEC_EPOCH_DURATION gives only a few slots before
      # unproven blocks are pruned — too tight for slow CI (ARM64).
      # No real proving happens here, so a larger value is safe.
      # Aztec's own e2e tests use a similar approach.
      AZTEC_PROOF_SUBMISSION_EPOCHS: 100
      # Concurrent tests with many simultaneous deployments can exceed the
      # default RPC_MAX_BODY_SIZE of 1mb.
      RPC_MAX_BODY_SIZE: "5mb"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--no-warnings",
          "/usr/src/yarn-project/aztec/dest/bin/index.js",
          "get-node-info",
        ]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 30s

  deploy:
    image: ${REGISTRY:-nethermind/}aztec-fpc-contract-deployment:${TAG:-local}
    volumes:
      - ./deployments/local:/app/data
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
      FPC_DEPLOYER_SECRET_KEY: "${FPC_DEPLOYER_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_DATA_DIR: "/app/data"
    depends_on:
      aztec-node:
        condition: service_healthy

  fund-l1-fee-juice:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    volumes:
      - ./scripts:/app/scripts:ro
    entrypoint: ["bash", "/app/scripts/services/fund-l1-fee-juice.sh"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      L1_FEE_JUICE_FUND_AMOUNT_WEI: "${L1_FEE_JUICE_FUND_AMOUNT_WEI:-1000000000000000000000}"
    depends_on:
      aztec-node:
        condition: service_healthy

  attestation:
    image: ${REGISTRY:-nethermind/}aztec-fpc-attestation:${TAG:-local}
    ports:
      - "3000:3000"
    volumes:
      - ./deployments/local:/app/data:ro
    command: ["--config", "/app/data/attestation/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-admin-secret}"
    depends_on:
      deploy:
        condition: service_completed_successfully

  topup:
    image: ${REGISTRY:-nethermind/}aztec-fpc-topup:${TAG:-local}
    ports:
      - "3001:3001"
    volumes:
      - ./deployments/local:/app/data:ro
    command: ["--config", "/app/data/topup/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      TOPUP_AUTOCLAIM_SECRET_KEY: "${TOPUP_AUTOCLAIM_SECRET_KEY:-${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}}"
      TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS: "${TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS:-}"
      TOPUP_OPS_PORT: "${TOPUP_OPS_PORT:-3001}"
      TOPUP_DATA_DIR: "${TOPUP_DATA_DIR:-/tmp/.topup-data}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
    depends_on:
      deploy:
        condition: service_completed_successfully
      fund-l1-fee-juice:
        condition: service_completed_successfully

  block-producer:
    image: ${REGISTRY:-nethermind/}aztec-fpc-contract-artifact:${TAG:-local}
    entrypoint: ["bash", "/app/scripts/services/block-producer.sh"]
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
    depends_on:
      aztec-node:
        condition: service_healthy

  configure-token:
    image: ${REGISTRY:-nethermind/}aztec-fpc-contract-deployment:${TAG:-local}
    volumes:
      - ./deployments/local:/app/data
    command: ["configure-token"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
      FPC_DEPLOYER_SECRET_KEY: "${FPC_DEPLOYER_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      FPC_DATA_DIR: "/app/data"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      ADMIN_API_KEY: "${ADMIN_API_KEY:-admin-secret}"
    depends_on:
      fund-l1-fee-juice:
        condition: service_completed_successfully

  postdeploy:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["postdeploy"]
    entrypoint: ["bun", "run", "--sequential"]
    command:
      - "scripts/contract/devnet-postdeploy-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      FPC_DEVNET_SMOKE_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      L1_RPC_URL: "http://anvil:8545"
      FPC_OPERATOR_SECRET_KEY: "${FPC_LOCAL_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully

  tests-services:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/services.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_TOPUP_OPS_URL: "http://topup:3001"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  tests-cold-start:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/cold-start.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      L1_RPC_URL: "http://anvil:8545"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  tests-fee-entrypoint-validation:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/fee-entrypoint-validation.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      topup:
        condition: service_healthy

  tests-concurrent:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/concurrent.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      L1_RPC_URL: "http://anvil:8545"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_CONCURRENT_N: "${FPC_CONCURRENT_N:-20}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  tests-same-token-transfer:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/same-token-transfer.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  tests-always-revert:
    image: ${REGISTRY:-nethermind/}aztec-fpc-test:${TAG:-local}
    profiles: ["full"]
    command:
      - "./scripts/tests/always-revert.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_TEST_TOKEN_MANIFEST: "/app/data/tokens/FpcAcceptedAsset.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      configure-token:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  wait:
    image: busybox
    profiles: ["full"]
    command: ["sh", "-c", "sleep 5"]
    depends_on:
      tests-services:
        condition: service_completed_successfully
      tests-cold-start:
        condition: service_completed_successfully
      tests-fee-entrypoint-validation:
        condition: service_completed_successfully
      tests-concurrent:
        condition: service_completed_successfully
      tests-same-token-transfer:
        condition: service_completed_successfully
      tests-always-revert:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

configs:
  fpc-config:
    file: ./fpc-config.yaml
