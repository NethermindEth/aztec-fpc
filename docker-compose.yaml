name: aztec-fpc
services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--silent"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "bn", "--rpc-url", "http://localhost:8545"]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 5s

  aztec-node:
    image: aztecprotocol/aztec:4.1.0-nightly.20260312.2
    command: ["start", "--local-network"]
    ports:
      - "8080:8080"
    environment:
      ARCHIVER_POLLING_INTERVAL_MS: 500
      P2P_BLOCK_CHECK_INTERVAL_MS: 500
      SEQ_TX_POLLING_INTERVAL_MS: 500
      WS_BLOCK_CHECK_INTERVAL_MS: 500
      ARCHIVER_VIEM_POLLING_INTERVAL_MS: 500
      TEST_ACCOUNTS: "true"
      LOG_LEVEL: "info;silent:sequencer;verbose:debug_log"
      DEPLOY_AZTEC_CONTRACTS_SALT: 1
      L1_CHAIN_ID: 31337
      ETHEREUM_HOSTS: "http://anvil:8545"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--no-warnings",
          "/usr/src/yarn-project/aztec/dest/bin/index.js",
          "get-node-info",
        ]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 30s

  deploy:
    image: nethermind/aztec-fpc-contract-deployment:local
    volumes:
      - ./deployments/local:/app/data
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
      FPC_DEPLOYER_SECRET_KEY: "${FPC_DEPLOYER_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      FPC_DATA_DIR: "/app/data"
    depends_on:
      aztec-node:
        condition: service_healthy

  fund-l1-fee-juice:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    volumes:
      - ./deployments/local:/app/data:ro
      - ./scripts:/app/scripts:ro
    entrypoint: ["bash", "/app/scripts/services/fund-l1-fee-juice.sh"]
    environment:
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      FPC_DATA_DIR: "/app/data"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      L1_FEE_JUICE_FUNDER_PRIVATE_KEY: "${L1_FEE_JUICE_FUNDER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      L1_FEE_JUICE_FUND_AMOUNT_WEI: "${L1_FEE_JUICE_FUND_AMOUNT_WEI:-1000000000000000000000}"
    depends_on:
      anvil:
        condition: service_healthy
      deploy:
        condition: service_completed_successfully

  attestation:
    image: nethermind/aztec-fpc-attestation:local
    ports:
      - "3000:3000"
    volumes:
      - ./deployments/local:/app/data:ro
    command: ["--config", "/app/data/attestation/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
    depends_on:
      deploy:
        condition: service_completed_successfully

  topup:
    image: nethermind/aztec-fpc-topup:local
    ports:
      - "3001:3001"
    volumes:
      - ./deployments/local:/app/data:ro
    command: ["--config", "/app/data/topup/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      TOPUP_AUTOCLAIM_SECRET_KEY: "${TOPUP_AUTOCLAIM_SECRET_KEY:-${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}}"
      TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS: "${TOPUP_AUTOCLAIM_SPONSORED_FPC_ADDRESS:-}"
      TOPUP_OPS_PORT: "${TOPUP_OPS_PORT:-3001}"
      TOPUP_BRIDGE_STATE_PATH: "${TOPUP_BRIDGE_STATE_PATH:-/tmp/.topup-bridge-state.json}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
    depends_on:
      fund-l1-fee-juice:
        condition: service_completed_successfully

  block-producer:
    image: nethermind/aztec-fpc-contract-artifact:local
    entrypoint: ["bash", "/app/scripts/services/block-producer.sh"]
    volumes:
      - ./scripts:/app/scripts:ro
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
    depends_on:
      aztec-node:
        condition: service_healthy

  postdeploy:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["postdeploy"]
    command:
      - "scripts/contract/devnet-postdeploy-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      FPC_DEVNET_SMOKE_MANIFEST: "/app/data/manifest.json"
      L1_RPC_URL: "http://anvil:8545"
      FPC_OPERATOR_SECRET_KEY: "${FPC_LOCAL_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully

  smoke-services:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["smoke", "full"]
    entrypoint: ["bun", "test"]
    command:
      - "./scripts/services/fpc-services-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_TOPUP_OPS_URL: "http://topup:3001"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  smoke-cold-start:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["smoke", "full"]
    command:
      - "scripts/cold-start/cold-start-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      L1_RPC_URL: "http://anvil:8545"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_L1_DEPLOYER_KEY: "${FPC_L1_DEPLOYER_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  e2e-fpc:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["e2e", "full"]
    entrypoint: ["bun", "test"]
    command:
      - "./scripts/services/fpc-full-lifecycle-e2e.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      topup:
        condition: service_healthy

  smoke-same-token-transfer:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["smoke", "full"]
    command:
      - "scripts/same-token-transfer/same-token-transfer-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  smoke-always-revert:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["smoke", "full"]
    entrypoint: ["bun", "test"]
    command:
      - "./scripts/always-revert/always-revert-smoke.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_ATTESTATION_URL: "http://attestation:3000"
      FPC_COLD_START_MANIFEST: "/app/data/manifest.json"
      FPC_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      PXE_PROVER_ENABLED: "${PXE_PROVER_ENABLED:-true}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  smoke-chaos:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["chaos", "full"]
    command:
      - "scripts/chaos/fpc-chaos-test.ts"
    volumes:
      - ./deployments/local:/app/data:ro
    environment:
      FPC_CHAOS_MODE: "${FPC_CHAOS_MODE:-full}"
      FPC_CHAOS_ATTESTATION_URL: "http://attestation:3000"
      FPC_CHAOS_TOPUP_URL: "http://topup:3001"
      FPC_CHAOS_NODE_URL: "http://aztec-node:8080"
      FPC_CHAOS_L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      FPC_CHAOS_MANIFEST: "/app/data/manifest.json"
      FPC_CHAOS_OPERATOR_SECRET_KEY: "${FPC_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
    depends_on:
      block-producer:
        condition: service_started
      deploy:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

  wait:
    image: busybox
    profiles: ["full"]
    command: ["sh", "-c", "sleep 5"]
    depends_on:
      smoke-services:
        condition: service_completed_successfully
      smoke-cold-start:
        condition: service_completed_successfully
      e2e-fpc:
        condition: service_completed_successfully
      smoke-same-token-transfer:
        condition: service_completed_successfully
      smoke-always-revert:
        condition: service_completed_successfully
      smoke-chaos:
        condition: service_completed_successfully
      attestation:
        condition: service_healthy
      topup:
        condition: service_healthy

configs:
  fpc-config:
    file: ./fpc-config.yaml
