services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--silent"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD", "cast", "bn", "--rpc-url", "http://localhost:8545"]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 5s

  aztec-node:
    image: aztecprotocol/aztec:4.0.0-devnet.2-patch.2
    command: ["start", "--local-network"]
    ports:
      - "8080:8080"
    environment:
      ARCHIVER_POLLING_INTERVAL_MS: 500
      P2P_BLOCK_CHECK_INTERVAL_MS: 500
      SEQ_TX_POLLING_INTERVAL_MS: 500
      WS_BLOCK_CHECK_INTERVAL_MS: 500
      ARCHIVER_VIEM_POLLING_INTERVAL_MS: 500
      TEST_ACCOUNTS: "true"
      LOG_LEVEL: "info;silent:sequencer;verbose:debug_log"
      DEPLOY_AZTEC_CONTRACTS_SALT: 1
      L1_CHAIN_ID: 31337
      ETHEREUM_HOSTS: "http://anvil:8545"
    depends_on:
      anvil:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "--no-warnings",
          "/usr/src/yarn-project/aztec/dest/bin/index.js",
          "get-node-info",
        ]
      interval: 1s
      timeout: 5s
      retries: 24
      start_period: 30s

  deploy:
    image: nethermind/aztec-fpc-contract-deployment:local
    configs:
      - source: fpc-config
        target: /app/fpc-config.yaml
    volumes:
      - ./configs:/app/configs
      - deploy-crs-cache:/root/.bb-crs
    environment:
      FPC_DEPLOY_ENV: "local"
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      PXE_PROVER: "${PXE_PROVER:-wasm}"
      CRS_PATH: "${CRS_PATH:-/root/.bb-crs}"
      FPC_LOCAL_DEPLOYER_ALIAS: "${FPC_LOCAL_DEPLOYER_ALIAS:-test0}"
      FPC_LOCAL_DEPLOYER_PRIVATE_KEY: "${FPC_LOCAL_DEPLOYER_PRIVATE_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_LOCAL_OPERATOR_SECRET_KEY: "${FPC_LOCAL_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_MASTER_CONFIG: "/app/fpc-config.yaml"
      FPC_LOCAL_OUT: "/app/configs/deploy-manifest.json"
      FPC_CONFIGS_OUT: "/app/configs"
    depends_on:
      aztec-node:
        condition: service_healthy

  config-sync:
    image: nethermind/aztec-fpc-contract-deployment:local
    entrypoint: ["bash", "/app/scripts/config/generate-service-configs.sh"]
    configs:
      - source: fpc-config
        target: /app/fpc-config.yaml
    volumes:
      - ./configs:/app/configs
      - ./scripts:/app/scripts:ro
    environment:
      FPC_LOCAL_OUT: "/app/configs/deploy-manifest.json"
      FPC_MASTER_CONFIG: "/app/fpc-config.yaml"
      FPC_CONFIGS_OUT: "/app/configs"
    depends_on:
      deploy:
        condition: service_completed_successfully

  fund-l1-fee-juice:
    image: ghcr.io/foundry-rs/foundry:v1.4.1
    volumes:
      - ./configs:/app/configs:ro
      - ./scripts:/app/scripts:ro
    entrypoint: ["bash", "/app/scripts/services/fund-l1-fee-juice.sh"]
    environment:
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      FPC_DEPLOY_MANIFEST: "/app/configs/deploy-manifest.json"
      L1_OPERATOR_PRIVATE_KEY_TOPUP: "${L1_OPERATOR_PRIVATE_KEY_TOPUP:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      L1_OPERATOR_PRIVATE_KEY_CREDIT: "${L1_OPERATOR_PRIVATE_KEY_CREDIT:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      L1_FEE_JUICE_FUNDER_PRIVATE_KEY: "${L1_FEE_JUICE_FUNDER_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      L1_FEE_JUICE_FUND_AMOUNT_WEI: "${L1_FEE_JUICE_FUND_AMOUNT_WEI:-1000000000000000000000}"
    depends_on:
      anvil:
        condition: service_healthy
      config-sync:
        condition: service_completed_successfully

  attestation:
    image: nethermind/aztec-fpc-attestation:local
    ports:
      - "3000:3000"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/attestation/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
    depends_on:
      config-sync:
        condition: service_completed_successfully

  attestation-credit:
    image: nethermind/aztec-fpc-attestation:local
    ports:
      - "3002:3002"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/attestation-credit/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      OPERATOR_SECRET_KEY: "${OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
    depends_on:
      config-sync:
        condition: service_completed_successfully

  topup:
    image: nethermind/aztec-fpc-topup:local
    ports:
      - "3001:3001"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/topup/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY_TOPUP:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
      TOPUP_OPS_PORT: "${TOPUP_OPS_PORT:-3001}"
      TOPUP_BRIDGE_STATE_PATH: "${TOPUP_BRIDGE_STATE_PATH:-/tmp/.topup-bridge-state.json}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
      TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX: "${TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX:-0}"
    depends_on:
      fund-l1-fee-juice:
        condition: service_completed_successfully

  topup-credit:
    image: nethermind/aztec-fpc-topup:local
    ports:
      - "3003:3003"
    volumes:
      - ./configs:/app/configs:ro
    command: ["--config", "/app/configs/topup-credit/config.yaml"]
    environment:
      AZTEC_NODE_URL: "${AZTEC_NODE_URL:-http://aztec-node:8080}"
      L1_RPC_URL: "${L1_RPC_URL:-http://anvil:8545}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY_CREDIT:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      TOPUP_OPS_PORT: "${TOPUP_CREDIT_OPS_PORT:-3003}"
      TOPUP_BRIDGE_STATE_PATH: "${TOPUP_CREDIT_BRIDGE_STATE_PATH:-/tmp/.topup-credit-bridge-state.json}"
      TOPUP_AUTOCLAIM_ENABLED: "${TOPUP_AUTOCLAIM_ENABLED:-1}"
      TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX: "${TOPUP_AUTOCLAIM_TEST_ACCOUNT_INDEX:-0}"
    depends_on:
      fund-l1-fee-juice:
        condition: service_completed_successfully

  postdeploy:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["postdeploy"]
    command:
      - "scripts/contract/devnet-postdeploy-smoke.ts"
    volumes:
      - ./configs:/app/configs:ro
    environment:
      FPC_DEVNET_SMOKE_MANIFEST: "/app/configs/deploy-manifest.json"
      L1_RPC_URL: "http://anvil:8545"
      FPC_DEVNET_OPERATOR_SECRET_KEY: "${FPC_LOCAL_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      L1_OPERATOR_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
    depends_on:
      deploy:
        condition: service_completed_successfully

  smoke:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["smoke", "full"]
    command:
      - "scripts/services/fpc-services-smoke.ts"
      - "services/attestation/test/fee-entrypoint-local-smoke.ts"
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_LOCAL_OPERATOR_SECRET_KEY: "${FPC_LOCAL_OPERATOR_SECRET_KEY:-0x2153536ff6628eee01cf4024889ff977a18d9fa61d0e414422f7681cf085c281}"
      FPC_SMOKE_L1_RPC_URL: "http://anvil:8545"
      FPC_SERVICES_SMOKE_L1_RPC_URL: "http://anvil:8545"
    depends_on:
      deploy:
        condition: service_completed_successfully

  e2e-fpc:
    image: nethermind/aztec-fpc-smoke:local
    profiles: ["e2e-fpc"]
    command:
      - "scripts/services/fpc-full-lifecycle-e2e.ts"
    volumes:
      - ./artifacts/compose-e2e/fpc:/artifacts/fpc
    environment:
      AZTEC_NODE_URL: "http://aztec-node:8080"
      FPC_FULL_E2E_L1_RPC_URL: "http://anvil:8545"
      FPC_FULL_E2E_ARTIFACTS_DIR: "/artifacts/fpc"
      FPC_FULL_E2E_L1_PRIVATE_KEY: "${L1_OPERATOR_PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}"
    depends_on:
      deploy:
        condition: service_completed_successfully

configs:
  fpc-config:
    file: ./fpc-config.yaml

volumes:
  deploy-crs-cache:
